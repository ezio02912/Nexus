global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nexus-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:7200
        labels:
          service: api-gateway
      - targets:
          - host.docker.internal:7201
        labels:
          service: tenant-service
      - targets:
          - host.docker.internal:7202
        labels:
          service: identity-service
      - targets:
          - host.docker.internal:7203
        labels:
          service: permission-service
      - targets:
          - host.docker.internal:7204
        labels:
          service: audit-service
      - targets:
          - host.docker.internal:7205
        labels:
          service: file-service
      - targets:
          - host.docker.internal:7206
        labels:
          service: numbering-service
      - targets:
          - host.docker.internal:7207
        labels:
          service: workflow-service
      - targets:
          - host.docker.internal:7208
        labels:
          service: crm-service
      - targets:
          - host.docker.internal:7209
        labels:
          service: sales-service
      - targets:
          - host.docker.internal:7210
        labels:
          service: notification-service
      - targets:
          - host.docker.internal:7211
        labels:
          service: masterdata-service
