server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: nexus-services
    static_configs:
      - targets:
          - localhost
        labels:
          job: nexus-services
          __path__: /var/log/nexus/*.log
    pipeline_stages:
      - regex:
          expression: '.*/(?P<service>[^/]+)\.log'
          source: filename
      - labels:
          service:
